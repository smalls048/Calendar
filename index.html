                    if (topPx < lastEndPx) { currentOverlapLevel++; } else { currentOverlapLevel = 0; }
                    lastEndPx = Math.max(lastEndPx, topPx + heightPx);

                    block.style.top = topPx + 'px'; block.style.height = heightPx + 'px';
                    const indent = currentOverlapLevel * 8; 
                    block.style.left = (2 + indent) + '%'; block.style.width = (94 - indent) + '%';
                    
                    let icons = evt.isRecurring ? '<i class="fas fa-redo recurring-icon"></i>' : '';
                    if (evt.endDate && evt.originalStartDate !== day.dateStr) icons += '<i class="fas fa-arrow-right recurring-icon"></i>';

                    block.innerHTML = `<div class="time-block-title">${icons}${evt.title}</div><div class="time-block-time">${evt.time} ${evt.endTime ? '- ' + evt.endTime : ''}</div>`;
                    
                    if (!evt.isRecurring && renderEndH <= endH) {
                        const handle = document.createElement('div'); handle.className = 'resize-handle';
                        setupResizeHandle(handle, block, evt, day.dateStr); block.appendChild(handle);
                    }
                    block.onclick = (ev) => { ev.stopPropagation(); openModal(day.dateStr, evt.time); };
                    setupDragAndDrop(block, evt, day.dateStr); col.appendChild(block);
                });
                body.appendChild(col);
            });
            wrapper.appendChild(body); viewArea.appendChild(wrapper);
            
            setTimeout(() => { 
                const now = new Date(); 
                let scrollTarget = (now.getHours() - startH - 1) * PIXELS_PER_HOUR;
                if(scrollTarget < 0) scrollTarget = 0;
                wrapper.scrollTop = scrollTarget; 
            }, 10);
        }

        function updateCurrentTimeLine() {
            const line = document.getElementById('current-time-line');
            if(line) {
                const useWH = appSettings.workingHours.active;
                const startH = useWH ? appSettings.workingHours.start : 0;
                const now = new Date(); 
                line.style.top = `${(now.getHours() + (now.getMinutes() / 60) - startH) * PIXELS_PER_HOUR}px`;
            }
        }

        // --- Modals & Event Logic ---
        function openModal(dateStr, prefillTime = null) {
            selectedDateString = dateStr;
            const dObj = new Date(dateStr + 'T00:00:00');
            document.getElementById('modal-date-display').innerText = dObj.toLocaleDateString('default', { weekday: 'short', month: 'short', day: 'numeric' });
            
            eventTitleInput.value = ''; eventTimeInput.value = prefillTime || ''; eventEndTimeInput.value = ''; eventEndDateInput.value = ''; 
            eventLocationInput.value = ''; eventDescInput.value = ''; eventReminderInput.checked = false; eventRecurrenceSelect.value = 'none';
            
            if(activeCalendarView !== 'All' && calendars.includes(activeCalendarView)) eventCalendarSelect.value = activeCalendarView;
            else if(calendars.length > 0) eventCalendarSelect.value = calendars[0];

            const listContainer = document.getElementById('event-list'); listContainer.innerHTML = '';
            const dayEvents = getEventsForDate(dateStr);
            
            if(dayEvents.length > 0) {
                dayEvents.forEach((evt, index) => {
                    const isRecurring = evt.isRecurring;
                    const identifier = isRecurring ? `'${evt.id}', true` : `'${evt.id}', false, '${evt.originalStartDate}'`;
                    let extraInfo = '';
                    if (evt.location) extraInfo += `<div>📍 ${evt.location}</div>`;
                    if (evt.description) extraInfo += `<div>📝 ${evt.description}</div>`;
                    if (evt.endTime) extraInfo += `<div>⏱ Ends at: ${evt.endTime}</div>`;
                    if (evt.endDate) extraInfo += `<div>⏳ Ends on: ${evt.endDate}</div>`;

                    listContainer.innerHTML += `
                        <div class="event-list-item" style="border-left-color: ${evt.displayColor}; align-items: flex-start;">
                            <div style="flex: 1;">
                                ${isRecurring ? '<i class="fas fa-redo recurring-icon"></i> ' : ''}
                                <strong>${evt.time || 'All day'}</strong> - ${evt.title} 
                                <div style="font-size:0.75rem;color:gray; margin-top: 4px;">[${evt.calendar || 'Uncategorized'}]</div>
                                ${extraInfo ? `<div style="font-size:0.75rem; margin-top: 5px; opacity: 0.85;">${extraInfo}</div>` : ''}
                            </div>
                            <button class="delete-btn" onclick="deleteEvent('${dateStr}', ${identifier})" title="Delete Instance"><i class="fas fa-trash"></i></button>
                        </div>`;
                });
            }
            eventModal.style.display = 'flex';
            setTimeout(() => eventTitleInput.focus(), 50); // Small delay to ensure focus registers
        }

        function saveEvent() {
            const title = eventTitleInput.value.trim(); const time = eventTimeInput.value;
            let endTime = eventEndTimeInput.value; let endDate = eventEndDateInput.value;
            const location = eventLocationInput.value.trim(); const description = eventDescInput.value.trim();
            const calendar = eventCalendarSelect.value; const color = eventColorInput.value; 
            const reminder = eventReminderInput.checked; const recurrence = eventRecurrenceSelect.value;

            if (!title) return alert('Please enter an event title.');
            
            if (endDate) {
                const sDate = new Date(selectedDateString + 'T00:00:00'); const eDate = new Date(endDate + 'T00:00:00');
                if (eDate < sDate) return alert("End Date cannot be before Start Date.");
                if (endDate === selectedDateString) endDate = ""; 
            }
            
            if (time && !endTime) {
                let [h, m] = time.split(':').map(Number); h = (h + 1) % 24;
                endTime = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            }

            if (time && recurrence === 'none' && !endDate) {
                const existing = getEventsForDate(selectedDateString).filter(e => e.time && e.time === time);
                if(existing.length > 0) {
                    if(!confirm(`You already have an event at ${time} ("${existing[0].title}"). Save anyway?`)) return;
                }
            }

            const newEvent = { id: 'evt_' + Date.now(), title, time, endTime, endDate, location, description, calendar, color, reminder };

            if (recurrence !== 'none') { recurringEvents.push({ ...newEvent, recurrence, startDate: selectedDateString, exceptions: [] }); } 
            else { if (!events[selectedDateString]) events[selectedDateString] = []; events[selectedDateString].push(newEvent); }
            saveToLocalStorage(); closeModal('event-modal'); renderCalendar();
        }

        function deleteEvent(dateStr, id, isRecurring, originalStartDate) {
            if (isRecurring) {
                const recIndex = recurringEvents.findIndex(r => r.id === id);
                if (recIndex > -1) {
                    if(confirm("Delete this instance or the entire series?\n\nOK = Delete only this instance\nCancel = Delete the whole series")) {
                        recurringEvents[recIndex].exceptions.push(dateStr); 
                    } else { recurringEvents.splice(recIndex, 1); }
                }
            } else {
                const realEvents = events[originalStartDate] || [];
                const rawIndex = realEvents.findIndex(e => e.id === id);
                if (rawIndex > -1) { realEvents.splice(rawIndex, 1); if(realEvents.length === 0) delete events[originalStartDate]; }
            }
            saveToLocalStorage(); openModal(dateStr); renderCalendar();
        }

        function getContrastYIQ(hex){
            if (!hex) return 'black';
            if (hex.startsWith('var(')) return 'white';
            hex = hex.replace("#", ""); if(hex.length === 3) hex = hex.split('').map(c => c+c).join('');
            const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
            if(isNaN(r)||isNaN(g)||isNaN(b)) return 'white';
            return (((r*299)+(g*587)+(b*114))/1000 >= 128) ? 'black' : 'white';
        }

        // --- Data Management (Backup, Restore, ICS) ---
        function backupData() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({events, recurringEvents, calendars, calendarColors, appSettings, todos})); const a = document.createElement('a'); a.href = dataStr; a.download = "calendar_backup.json"; document.body.appendChild(a); a.click(); a.remove(); closeModal('settings-modal'); }
        function restoreData(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(evt) { try { const parsed = JSON.parse(evt.target.result); if(parsed.events) { events = parsed.events; recurringEvents = parsed.recurringEvents || []; calendars = parsed.calendars || ['Personal']; calendarColors = parsed.calendarColors || {}; appSettings = parsed.appSettings || { enforceColors: false, theme: 'system' }; if(appSettings.workingHours===undefined) appSettings.workingHours = {active:false,start:6,end:22}; todos = parsed.todos || []; for (let key in calendarColors) { if (typeof calendarColors[key] === 'string') { calendarColors[key] = { color: calendarColors[key], isAuto: false }; } } } else { events = parsed; } Object.values(events).forEach(dayArr => dayArr.forEach(ev => { if(!ev.id) ev.id = 'evt_' + Math.random().toString(36).substr(2, 9); })); localStorage.setItem('calendarCategories', JSON.stringify(calendars)); localStorage.setItem('calendarColors', JSON.stringify(calendarColors)); localStorage.setItem('appSettings', JSON.stringify(appSettings)); localStorage.setItem('calendarTodos', JSON.stringify(todos)); saveToLocalStorage(); applyTheme(appSettings.theme); renderFilters(); renderCalendar(); renderTodos(); alert("Data restored!"); } catch (error) { alert("Error parsing file."); } }; reader.readAsText(file); closeModal('settings-modal'); }
        function exportICS() { let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Smart Calendar App//EN\n"; for (const [dateStr, dayEvents] of Object.entries(events)) { dayEvents.forEach(evt => { ics += "BEGIN:VEVENT\n"; ics += `UID:${evt.id}@smartcalendar\n`; ics += `DTSTART:${formatDateForICS(dateStr, evt.time)}\n`; if(evt.endDate || evt.endTime) { const endD = evt.endDate || dateStr; const endT = evt.endTime || evt.time; ics += `DTEND:${formatDateForICS(endD, endT)}\n`; } ics += `SUMMARY:${evt.title}\n`; if(evt.description) ics += `DESCRIPTION:${evt.description}\n`; if(evt.location) ics += `LOCATION:${evt.location}\n`; ics += "END:VEVENT\n"; }); } recurringEvents.forEach(evt => { ics += "BEGIN:VEVENT\n"; ics += `UID:${evt.id}@smartcalendar\n`; ics += `DTSTART:${formatDateForICS(evt.startDate, evt.time)}\n`; let freq = 'DAILY'; if(evt.recurrence === 'weekly') freq = 'WEEKLY'; if(evt.recurrence === 'monthly') freq = 'MONTHLY'; if(evt.recurrence === 'yearly') freq = 'YEARLY'; if(evt.recurrence === 'weekdays') { freq = 'WEEKLY'; ics += `RRULE:FREQ=${freq};BYDAY=MO,TU,WE,TH,FR\n`; } else { ics += `RRULE:FREQ=${freq}\n`; } ics += `SUMMARY:${evt.title}\n`; if(evt.description) ics += `DESCRIPTION:${evt.description}\n`; if(evt.location) ics += `LOCATION:${evt.location}\n`; ics += "END:VEVENT\n"; }); ics += "END:VCALENDAR"; const a = document.createElement('a'); a.href = "data:text/calendar;charset=utf-8," + encodeURIComponent(ics); a.download = "calendar_export.ics"; document.body.appendChild(a); a.click(); a.remove(); closeModal('settings-modal'); }
        function importICS(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(evt) { const lines = evt.target.result.split(/\r?\n/); let currentEvent = null; let importedCount = 0; let calName = "Imported Calendar"; lines.forEach(line => { if(line.startsWith("X-WR-CALNAME:")) calName = line.substring(13).trim(); }); if(!calendars.includes(calName)) { calendars.push(calName); calendarColors[calName] = { color: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'), isAuto: false }; } lines.forEach(line => { if(line.startsWith("BEGIN:VEVENT")) currentEvent = { id: 'evt_' + Date.now() + Math.random().toString(36).substr(2, 5), calendar: calName }; else if(line.startsWith("END:VEVENT") && currentEvent && currentEvent.startDate) { if(!events[currentEvent.startDate]) events[currentEvent.startDate] = []; events[currentEvent.startDate].push(currentEvent); importedCount++; currentEvent = null; } else if(currentEvent) { if(line.startsWith("SUMMARY:")) currentEvent.title = line.substring(8); else if(line.startsWith("DESCRIPTION:")) currentEvent.description = line.substring(12); else if(line.startsWith("LOCATION:")) currentEvent.location = line.substring(9); else if(line.startsWith("DTSTART")) { const val = line.split(':')[1]; if(val && val.length >= 8) { currentEvent.startDate = `${val.substring(0,4)}-${val.substring(4,6)}-${val.substring(6,8)}`; if(val.includes('T')) { const tIndex = val.indexOf('T'); currentEvent.time = `${val.substring(tIndex+1, tIndex+3)}:${val.substring(tIndex+3, tIndex+5)}`; } } } else if(line.startsWith("DTEND")) { const val = line.split(':')[1]; if(val && val.length >= 8 && val.includes('T')) { const tIndex = val.indexOf('T'); currentEvent.endTime = `${val.substring(tIndex+1, tIndex+3)}:${val.substring(tIndex+3, tIndex+5)}`; } } } }); appSettings.enforceColors = true; saveToLocalStorage(); openSettings(); renderCalendar(); alert(`Imported ${importedCount} events! Check the Settings menu to adjust the color for "${calName}".`); }; reader.readAsText(file); }
        function formatDateForICS(dateStr, timeStr) { const date = dateStr.replace(/-/g, ''); if(!timeStr) return date; const time = timeStr.replace(':', '') + '00'; return `${date}T${time}`; }
        
        async function exportImage() { toggleMenu(); const container = document.getElementById('calendar-container'); const canvas = await html2canvas(container, { scale: 2, backgroundColor: getComputedStyle(document.body).getPropertyValue('--container-bg') }); const link = document.createElement('a'); link.download = 'calendar.png'; link.href = canvas.toDataURL('image/png'); link.click(); }
        async function exportPDF() { toggleMenu(); const container = document.getElementById('calendar-container'); const canvas = await html2canvas(container, { scale: 2, backgroundColor: getComputedStyle(document.body).getPropertyValue('--container-bg') }); const imgData = canvas.toDataURL('image/png'); const { jsPDF } = window.jspdf; const pdf = new jsPDF({ orientation: "landscape", unit: "px", format: [canvas.width, canvas.height] }); pdf.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height); pdf.save("calendar.pdf"); }
        function requestNotificationPermission() { toggleMenu(); if (!("Notification" in window)) alert("Browser does not support notifications"); else if (Notification.permission === "granted") alert("Reminders already enabled!"); else if (Notification.permission !== "denied") Notification.requestPermission().then(p => { if (p === "granted") new Notification("Reminders enabled!"); }); }
        function startReminderService() { setInterval(() => { const now = new Date(); const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`; const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`; const dayEvents = getEventsForDate(dateStr); dayEvents.forEach(evt => { if (evt.reminder && evt.time === timeStr) { if (Notification.permission === "granted") new Notification("Calendar Reminder", { body: evt.title }); else alert(`Reminder: ${evt.title}`); } }); }, 60000); }

        init();
    </script>
